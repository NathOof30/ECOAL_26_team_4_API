          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
                required: [data]
              example:
                data:
                  id: 1
                  title: Test Category
    put:
      tags: [Categories]
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
