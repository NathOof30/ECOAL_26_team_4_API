    get:
      tags: [Criteria]
      summary: List criteria
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
        - name: name
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_criteria, name]
      responses:
        '200':
          description: Paginated criteria
          content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriteriaCollectionResponse'
              example:
                data:
                  - id_criteria: 1
                    name: Test Criterion
                links:
                  first: http://127.0.0.1:8000/api/v1/criteria?page=1
                  last: http://127.0.0.1:8000/api/v1/criteria?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [Criteria]
      summary: Create a criterion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriteriaWriteRequest'
      responses:
        '201':
