            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, title]
      responses:
        '200':
          description: Paginated categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCollectionResponse'
              example:
                data:
                  - id: 1
                    title: Test Category
                links:
                  first: http://127.0.0.1:8000/api/v1/categories?page=1
                  last: http://127.0.0.1:8000/api/v1/categories?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [Categories]
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWriteRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/categories/{category}:
    get:
      tags: [Categories]
      summary: Show a category
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
