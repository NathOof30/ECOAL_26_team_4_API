          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/items:
    get:
      tags: [Items]
      summary: List items
      description: Public item fields such as `collection_id`, `category1_id`, and `category2_id` are compatibility fields exposed by the API. Internally the application resolves them through the `collections_items` and `items_categories` pivot tables.
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
        - name: collection_id
          in: query
          description: Filters items by the resolved collection relation.
          schema:
            type: integer
        - name: category1_id
          in: query
          description: Filters items by the first resolved category slot.
          schema:
            type: integer
        - name: category2_id
          in: query
          description: Filters items by the second resolved category slot.
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: boolean
        - name: title
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, title, collection_id, created_at]
      responses:
        '200':
          description: Paginated items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCollectionResponse'
              example:
                data:
                  - id: 1
                    title: My First Item
                    description: A shiny new item
                    image_url: null
                    status: true
                    collection_id: 1
                    category1_id: 1
                    category2_id: null
                    collection:
                      id: 1
                      title: My First Collection
                      description: Test description
                      user_id: 1
                    category1:
                      id: 1
                      title: Test Category
                    category2: null
                    criteria: []
                links:
                  first: http://127.0.0.1:8000/api/v1/items?page=1
                  last: http://127.0.0.1:8000/api/v1/items?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [Items]
      summary: Create an item in the authenticated user's collection
      description: The item is internally associated to the authenticated user's collection through `collections_items`. Category fields remain part of the public contract and are mapped internally to `items_categories`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemWriteRequest'
            example:
              title: My First Item
              description: A shiny new item
              status: true
              category1_id: 1
              category2_id: null
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Item'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/items/{item}:
    get:
      tags: [Items]
      summary: Show an item
      description: Item relationship fields are exposed as stable compatibility fields even though the internal model uses pivot tables.
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Item'
                required: [data]
              example:
                data:
                  id: 1
                  title: My First Item
                  description: A shiny new item
                  image_url: null
                  status: true
                  collection_id: 1
                  category1_id: 1
                  category2_id: null
                  collection:
                    id: 1
                    title: My First Collection
                    description: Test description
                    user_id: 1
                  category1:
                    id: 1
                    title: Test Category
                  category2: null
                  criteria:
                    - id_criteria: 1
                      name: Test Criterion
    put:
      tags: [Items]
      summary: Update an item
      description: Category compatibility fields are mapped internally to the `items_categories` pivot table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemWriteRequest'
            example:
              title: Updated Item
              description: Refined item description
              status: false
              category1_id: 1
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Item'
                required: [data]
              example:
                data:
                  id: 1
                  title: Updated Item
                  description: Refined item description
                  image_url: null
                  status: false
                  collection_id: 1
                  category1_id: 1
                  category2_id: null
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Items]
      summary: Partially update an item
      description: Category compatibility fields are mapped internally to the `items_categories` pivot table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemWriteRequest'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Item'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Items]
      summary: Delete an item
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '204':
          description: Item deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/item-criteria:
    get:
      tags: [ItemCriteria]
      summary: List item scores
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
        - name: id_item
          in: query
          schema:
            type: integer
        - name: id_criteria
          in: query
          schema:
            type: integer
        - name: value
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
        - name: sort
          in: query
          schema:
            type: string
            enum: [id_item, id_criteria, value]
      responses:
        '200':
          description: Paginated item scores
          content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCriteriaCollectionResponse'
              example:
                data:
                  - id_item: 1
                    id_criteria: 1
                    value: 2
                    item:
                      id: 1
                      title: My First Item
                      description: A shiny new item
                      image_url: null
                      status: true
                      collection_id: 1
                      category1_id: 1
                      category2_id: null
                    criteria:
                      id_criteria: 1
                      name: Test Criterion
                links:
                  first: http://127.0.0.1:8000/api/v1/item-criteria?page=1
                  last: http://127.0.0.1:8000/api/v1/item-criteria?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [ItemCriteria]
      summary: Create a score for an item and criterion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCriteriaWriteRequest'
            example:
              id_item: 1
              id_criteria: 1
              value: 2
      responses:
        '201':
          description: Score created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ItemCriteria'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/items/{item}/criteria:
    get:
      tags: [ItemCriteria]
      summary: List scores for a specific item
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated scores for the item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCriteriaCollectionResponse'
  /api/v1/items/{item}/criteria/{criterion}:
    put:
      tags: [ItemCriteria]
      summary: Update a score value
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/CriterionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCriteriaUpdateRequest'
            example:
              value: 1
      responses:
        '200':
          description: Score updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ItemCriteria'
                required: [data]
              example:
                data:
                  id_item: 1
                  id_criteria: 1
                  value: 1
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [ItemCriteria]
      summary: Delete a score
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/CriterionId'
      responses:
        '204':
          description: Score deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Score not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  parameters:
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    CollectionId:
      name: collection
      in: path
      required: true
      schema:
        type: integer
    CategoryId:
      name: category
      in: path
      required: true
      schema:
        type: integer
    ItemId:
      name: item
      in: path
      required: true
      schema:
        type: integer
    CriterionId:
      name: criterion
      in: path
      required: true
      schema:
        type: integer
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
    AdminCreateUserRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        is_active:
          type: boolean
        user_type:
          type: string
          enum: [admin, editor, user]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        is_active:
          type: boolean
        user_type:
          type: string
          enum: [admin, editor, user]
    CollectionWriteRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
    CategoryWriteRequest:
      type: object
      properties:
        title:
          type: string
    CriteriaWriteRequest:
      type: object
      properties:
        name:
          type: string
    ItemWriteRequest:
      type: object
      description: Public write contract for items. Category fields are compatibility fields that are mapped internally to the `items_categories` pivot table.
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        status:
          type: boolean
        category1_id:
          type: integer
          description: Primary category compatibility field exposed by the API.
        category2_id:
          type: integer
          nullable: true
          description: Secondary category compatibility field exposed by the API.
    ItemCriteriaWriteRequest:
      type: object
      required: [id_item, id_criteria, value]
      properties:
        id_item:
          type: integer
        id_criteria:
          type: integer
        value:
          type: integer
          enum: [0, 1, 2]
    ItemCriteriaUpdateRequest:
      type: object
      required: [value]
      properties:
        value:
          type: integer
          enum: [0, 1, 2]
    AuthSuccessResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            access_token:
              type: string
            token_type:
              type: string
              example: Bearer
            user:
              $ref: '#/components/schemas/User'
          required: [access_token, token_type, user]
      required: [data]
    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string
          required: [message]
      required: [data]
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
      required: [message, status]
      example:
        message: Forbidden.
        status: 403
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [message, status, errors]
      example:
        message: The given data was invalid.
        status: 422
        errors:
          email:
            - The email field is required.
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        is_active:
          type: boolean
        user_type:
          type: string
          enum: [admin, editor, user]
        collection:
          $ref: '#/components/schemas/CollectionSummary'
    UserPublic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
        collection:
          $ref: '#/components/schemas/CollectionSummary'
    UserPublicSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        nationality:
          type: string
          nullable: true
    Collection:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/UserPublicSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemSummary'
    CollectionSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        user_id:
          type: integer
    Category:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
    Criteria:
      type: object
      properties:
        id_criteria:
          type: integer
        name:
          type: string
    Item:
      type: object
      description: Public item representation. `collection_id`, `category1_id`, and `category2_id` are stable API fields derived from pivot-backed relations rather than direct foreign key columns on `items`.
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        status:
          type: boolean
          nullable: true
        collection_id:
          type: integer
          description: Resolved collection identifier exposed for client compatibility.
        category1_id:
          type: integer
          description: Resolved primary category identifier exposed for client compatibility.
        category2_id:
          type: integer
          nullable: true
          description: Resolved secondary category identifier exposed for client compatibility.
        collection:
          $ref: '#/components/schemas/CollectionSummary'
        category1:
          $ref: '#/components/schemas/Category'
        category2:
          $ref: '#/components/schemas/Category'
        criteria:
          type: array
          items:
            $ref: '#/components/schemas/Criteria'
    ItemSummary:
      type: object
      description: Condensed item representation using the same compatibility fields exposed by the full item schema.
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        status:
          type: boolean
          nullable: true
        collection_id:
          type: integer
          description: Resolved collection identifier exposed for client compatibility.
        category1_id:
          type: integer
          description: Resolved primary category identifier exposed for client compatibility.
        category2_id:
          type: integer
          nullable: true
          description: Resolved secondary category identifier exposed for client compatibility.
    ItemCriteria:
      type: object
      properties:
        id_item:
          type: integer
        id_criteria:
          type: integer
        value:
          type: integer
          enum: [0, 1, 2]
        item:
          $ref: '#/components/schemas/ItemSummary'
        criteria:
          $ref: '#/components/schemas/Criteria'
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    UserPublicCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserPublic'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CollectionCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Collection'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CategoryCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CriteriaCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Criteria'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ItemCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ItemCriteriaCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ItemCriteria'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
