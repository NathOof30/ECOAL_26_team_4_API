openapi: 3.1.0
info:
  title: ECOAL API
  version: 1.0.0
  description: OpenAPI contract for the ECOAL API.
servers:
  - url: http://127.0.0.1:8000
paths:
  /api/v1/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: New User
              email: newuser@example.com
              password: StrongPass1!
              password_confirmation: StrongPass1!
              avatar_url: null
              nationality: PT
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
              example:
                data:
                  access_token: 1|exampletoken
                  token_type: Bearer
                  user:
                    id: 10
                    name: New User
                    email: newuser@example.com
                    avatar_url: null
                    nationality: PT
                    is_active: true
                    user_type: user
                    collection: null
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/login:
    post:
      tags: [Auth]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: test@example.com
              password: password
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
              example:
                data:
                  access_token: 1|exampletoken
                  token_type: Bearer
                  user:
                    id: 1
                    name: Test User
                    email: test@example.com
                    avatar_url: null
                    nationality: null
                    is_active: true
                    user_type: user
                    collection:
                      id: 1
                      title: My First Collection
                      description: Test description
                      user_id: 1
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Inactive account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/forgot-password:
    post:
      tags: [Auth]
      summary: Generate and send a password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            example:
              email: test@example.com
      responses:
        '200':
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  message: We have emailed your password reset link.
        '400':
          description: Reset link could not be sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reset-password:
    post:
      tags: [Auth]
      summary: Reset a password using token and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              email: test@example.com
              token: RESET_TOKEN
              password: NewStrongPass1!
              password_confirmation: NewStrongPass1!
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  message: Your password has been reset.
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                data:
                  message: Successfully logged out
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/user:
    get:
      tags: [Auth]
      summary: Get the authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                required: [data]
              example:
                data:
                  id: 1
                  name: Test User
                  email: test@example.com
                  avatar_url: null
                  nationality: null
                  is_active: true
                  user_type: user
                  collection:
                    id: 1
                    title: My First Collection
                    description: Test description
                    user_id: 1
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users:
    get:
      tags: [Users]
      summary: List public user profiles
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
        - name: name
          in: query
          schema:
            type: string
        - name: nationality
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, name, nationality]
      responses:
        '200':
          description: Paginated public users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicCollectionResponse'
              example:
                data:
                  - id: 1
                    name: Test User
                    avatar_url: null
                    nationality: PT
                    collection:
                      id: 1
                      title: Alpha
                      description: Public collection
                      user_id: 1
                links:
                  first: http://127.0.0.1:8000/api/v1/users?page=1
                  last: http://127.0.0.1:8000/api/v1/users?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [Users]
      summary: Create a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
            example:
              name: Editor User
              email: editor@example.com
              password: StrongPass1!
              password_confirmation: StrongPass1!
              user_type: editor
              is_active: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/users/{user}:
    get:
      tags: [Users]
      summary: Show a public user profile
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Public user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserPublic'
                required: [data]
              example:
                data:
                  id: 1
                  name: Test User
                  avatar_url: null
                  nationality: PT
                  collection:
                    id: 1
                    title: Alpha
                    description: Public collection
                    user_id: 1
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              name: Updated User
              nationality: FR
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                required: [data]
              example:
                data:
                  id: 1
                  name: Updated User
                  email: test@example.com
                  avatar_url: null
                  nationality: FR
                  is_active: true
                  user_type: user
                  collection:
                    id: 1
                    title: Alpha
                    description: Public collection
                    user_id: 1
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    patch:
      tags: [Users]
      summary: Partially update a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags: [Users]
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/collections:
    get:
      tags: [Collections]
      summary: List collections
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
        - name: user_id
          in: query
          schema:
            type: integer
        - name: title
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, title, user_id]
      responses:
        '200':
          description: Paginated collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionCollectionResponse'
              example:
                data:
                  - id: 1
                    title: Alpha
                    description: First collection
                    user_id: 1
                    user:
                      id: 1
                      name: Test User
                      avatar_url: null
                      nationality: PT
                    items: []
                links:
                  first: http://127.0.0.1:8000/api/v1/collections?page=1
                  last: http://127.0.0.1:8000/api/v1/collections?page=1
                  prev: null
                  next: null
                meta:
                  current_page: 1
                  per_page: 15
                  total: 1
    post:
      tags: [Collections]
      summary: Create the authenticated user's collection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionWriteRequest'
            example:
              title: My First Collection
              description: Test description
      responses:
        '201':
          description: Collection created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Collection'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/v1/collections/{collection}:
    get:
      tags: [Collections]
      summary: Show a collection
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      responses:
        '200':
          description: Collection detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Collection'
                required: [data]
              example:
                data:
                  id: 1
                  title: Alpha
                  description: First collection
                  user_id: 1
                  user:
                    id: 1
                    name: Test User
                    avatar_url: null
                    nationality: PT
                  items:
                    - id: 1
                      title: My First Item
                      description: A shiny new item
                      image_url: null
                      status: true
                      collection_id: 1
                      category1_id: 1
                      category2_id: null
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Collections]
      summary: Update a collection
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionWriteRequest'
            example:
              title: Updated Collection
              description: Refined description
      responses:
        '200':
          description: Collection updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Collection'
                required: [data]
              example:
                data:
                  id: 1
                  title: Updated Collection
                  description: Refined description
                  user_id: 1
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Collections]
      summary: Partially update a collection
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionWriteRequest'
      responses:
        '200':
          description: Collection updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Collection'
                required: [data]
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Collections]
      summary: Delete a collection
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CollectionId'
      responses:
        '204':
          description: Collection deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Direction'
